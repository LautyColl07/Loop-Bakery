<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Fondo circular con gradiente -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B4B94"/>
      <stop offset="100%" stop-color="#C8A2D8"/>
    </linearGradient>
  </defs>
  <circle cx="50" cy="50" r="50" fill="url(#bg)"/>
  <!-- Silueta pastel estilizada (letra L de Loop) -->
  <text x="50" y="67" font-family="Georgia, serif" font-size="52" font-weight="bold"
        fill="white" text-anchor="middle" dominant-baseline="middle">L</text>
</svg>
